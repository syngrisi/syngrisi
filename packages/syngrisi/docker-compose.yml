version: '3.9'
services:
  syngrisi-app:
    container_name: syngrisi-app-server
    restart: always
    working_dir: /usr/src/syngrisi
    command: sh -c "npx --node-arg=--max-old-space-size=8192 sy"
    build:
      context: .
      dockerfile: syngrisi-app.dockerfile
      args:
        SY_VERSION: "${SYNGRISI_NPM_TAG:-latest}"

    ports:
      - "${SYNGRISI_DOCKER_PORT:-5000}:3000"
    volumes:
      - "${SYNGRISI_DOCKER_IMAGES_PATH:-./baselines}:/usr/src/syngrisi/baselines"
      - "${SYNGRISI_DOCKER_BACKUPS_PATH:-./backups}:/usr/src/syngrisi/backups"
    depends_on:
      syngrisi-db:
        condition: service_healthy
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '10'
    environment:
      SYNGRISI_DB_URI: "${SYNGRISI_DB_URI:-mongodb://syngrisi-db/SyngrisiDb}"
      SYNGRISI_IMAGES_PATH: "${SYNGRISI_IMAGES_PATH:-./baselines/}"
      SYNGRISI_AUTH: "${SYNGRISI_AUTH:-true}"
      SYNGRISI_TEST_MODE: "${SYNGRISI_TEST_MODE:-false}"
      SYNGRISI_DISABLE_FIRST_RUN: "${SYNGRISI_DISABLE_FIRST_RUN:-false}"
      SYNGRISI_PAGINATION_SIZE: "${SYNGRISI_PAGINATION_SIZE:-50}"
      SYNGRISI_SESSION_STORE_KEY: "${SYNGRISI_SESSION_STORE_KEY}"
      SYNGRISI_APP_PORT: 3000
      SYNGRISI_HTTP_LOG: "${SYNGRISI_HTTP_LOG:-false}"
      SYNGRISI_DISABLE_DEV_CORS: "true"
      SYNGRISI_RCA: "${SYNGRISI_RCA}"
      # "Private AI" (docker compose --profile ai): point AI Triage at the bundled Ollama
      # service instead of a cloud API. No-ops when unset (both default empty/false), so
      # plain `docker compose up` (no profile) is unaffected. See docs/AI_FEATURES.md.
      SYNGRISI_AI_TRIAGE_ENABLED: "${SYNGRISI_AI_TRIAGE_ENABLED:-false}"
      SYNGRISI_AI_TRIAGE_PROVIDER_JSON: "${SYNGRISI_AI_TRIAGE_PROVIDER_JSON:-}"

  syngrisi-db:
    cap_add:
      - CHOWN
    image: mongo:${MONGODB_VERSION:-8.0}
    container_name: syngrisi-db-server
    ports:
      - "${SYNGRISI_DOCKER_DB_PORT:-27017}:27017"
    command: [ "--bind_ip_all", "${SYNGRISI_DOCKER_DB_AUTH_ARG:---noauth}" ]
    restart: always
    volumes:
      - "${SYNGRISI_DOCKER_DB_PATH:-./data/db_data}:/data/db"
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '10'
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGODB_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGODB_ROOT_PASSWORD}"

    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 15s
      retries: 3000
      start_period: 40s

  # "Private AI" — bundled Ollama for AI Triage, only started via `docker compose --profile ai up`.
  # Zero API keys, zero screenshot egress: triage runs entirely against this local vision model.
  ollama:
    image: ollama/ollama:latest
    container_name: syngrisi-ollama
    profiles: ["ai"]
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - "${SYNGRISI_DOCKER_OLLAMA_DATA_PATH:-ollama_data}:/root/.ollama"
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '10'
    healthcheck:
      # The API being up is enough for "healthy" — pulling the (multi-GB) model happens in the
      # separate `ollama-pull` service so the healthcheck never blocks on a slow first-time download.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s

  # One-shot: pulls the vision model into the `ollama` service's volume, then exits.
  # Runs on every `--profile ai up` but `ollama pull` is a no-op once the model is already cached.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: syngrisi-ollama-pull
    profiles: ["ai"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "ollama:11434"
    entrypoint: ["sh", "-c", "ollama pull \"${OLLAMA_MODEL:-gemma4:12b}\""]
    restart: "no"

volumes:
  ollama_data: {}
