name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build
        run: yarn build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist/
            packages/syngrisi/mvc/views/react/
          retention-days: 1

  port-drift:
    # Fail a PR that changes the core-api client contract without updating the
    # Groovy/Python ports (keeps them at parity — see CLAUDE.md 'API Contract Parity').
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce core-api contract → port parity
        run: |
          if git log -1 --format='%B' | grep -q '\[skip-port-drift\]'; then
            echo "[skip-port-drift] present — bypassing."; exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          if ! echo "$CHANGED" | grep -qE '^packages/core-api/src/(Schemas|SyngrisiApi)\.ts$'; then
            echo "core-api contract files unchanged — ok"; exit 0
          fi
          if echo "$CHANGED" | grep -qE '^packages/core-api-(groovy|python)/'; then
            echo "core-api contract changed and ports updated — ok"; exit 0
          fi
          echo "::error::core-api contract (Schemas.ts / SyngrisiApi.ts) changed without updating the Groovy/Python ports. Update packages/core-api-groovy and packages/core-api-python to keep parity (see CLAUDE.md 'API Contract Parity'), or add [skip-port-drift] to the HEAD commit message for a contract-neutral change."
          exit 1

  test-unit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: packages/

      - name: Run unit tests
        run: yarn test:unit

  verify:
    runs-on: ubuntu-latest
    needs: build
    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: packages/
      # Ratchet gates: HARD-fail only when the pre-existing backlog GROWS. Green
      # today (129 server-tsc / 232 lint / 249 ui-tsc); any new error/violation
      # breaks CI. When you burn the backlog down, lower the baseline numbers below.
      - name: Typecheck ratchet (must not exceed baseline)
        working-directory: packages/syngrisi
        run: |
          TSC_BASELINE=129
          OUT=$(yarn typecheck 2>&1) || true
          if echo "$OUT" | grep -qE "error TS(5101|5103)"; then
            echo "$OUT" | tail -5
            echo "::error::typecheck hit a config-level error (TS5101/5103) — the ratchet cannot measure the real error count. Fix the tsc setup before relying on this gate."
            exit 1
          fi
          COUNT=$(echo "$OUT" | grep -c "error TS" || true)
          echo "tsc errors: $COUNT (baseline $TSC_BASELINE)"
          if [ "$COUNT" -gt "$TSC_BASELINE" ]; then
            echo "::error::TypeScript errors increased to $COUNT (baseline $TSC_BASELINE). Fix the new errors; if you legitimately reduced the count, lower TSC_BASELINE in .github/workflows/ci.yml."
            exit 1
          fi
      - name: UI typecheck ratchet (must not exceed baseline)
        working-directory: packages/syngrisi
        run: |
          UI_TSC_BASELINE=0
          OUT=$(yarn typecheck:ui 2>&1) || true
          if echo "$OUT" | grep -qE "error TS(5101|5103|18003)"; then
            echo "$OUT" | tail -5
            echo "::error::ui typecheck hit a config-level error (TS5101/5103/18003) — the ratchet cannot measure the real error count. Fix src/ui-app/tsconfig.json before relying on this gate."
            exit 1
          fi
          COUNT=$(echo "$OUT" | grep "error TS" | grep -vc node_modules || true)
          echo "ui tsc errors: $COUNT (baseline $UI_TSC_BASELINE)"
          if [ "$COUNT" -gt "$UI_TSC_BASELINE" ]; then
            echo "::error::ui-app TypeScript errors increased to $COUNT (baseline $UI_TSC_BASELINE). Fix the new errors; if you legitimately reduced the count, lower UI_TSC_BASELINE in .github/workflows/ci.yml."
            exit 1
          fi
      - name: Lint ratchet (must not exceed baseline)
        working-directory: packages/syngrisi
        run: |
          LINT_BASELINE=232
          COUNT=$(yarn lint 2>&1 | grep -oE "[0-9]+ problems" | tail -1 | grep -oE "^[0-9]+" || echo 0)
          echo "lint problems: $COUNT (baseline $LINT_BASELINE)"
          if [ "$COUNT" -gt "$LINT_BASELINE" ]; then
            echo "::error::Lint problems increased to $COUNT (baseline $LINT_BASELINE). Fix the new violations; if you reduced them, lower LINT_BASELINE in .github/workflows/ci.yml."
            exit 1
          fi
      - name: UI no-explicit-any ratchet (must not exceed baseline)
        working-directory: packages/syngrisi
        run: |
          UI_ANY_BASELINE=597
          COUNT=$(yarn lint:ui 2>&1 | grep -oE "[0-9]+ problems" | tail -1 | grep -oE "^[0-9]+" || echo 0)
          echo "ui explicit-any problems: $COUNT (baseline $UI_ANY_BASELINE)"
          if [ "$COUNT" -gt "$UI_ANY_BASELINE" ]; then
            echo "::error::ui-app explicit-any count increased to $COUNT (baseline $UI_ANY_BASELINE). Type it instead of using any; if you reduced the count, lower UI_ANY_BASELINE in .github/workflows/ci.yml."
            exit 1
          fi
      - name: Server unit tests (HARD GATE)
        run: yarn test:server
        env:
          SYNGRISI_DB_URI: mongodb://localhost:27017/SyngrisiDbTest

  test-e2e:
    runs-on: ubuntu-latest
    needs: build
    # E2E on CI is OFF by default and opt-in only: it runs solely when the pushed
    # HEAD commit message contains the [run-e2e] marker (add it only at the user's
    # request). E2E must be run locally before merging/releasing instead.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-e2e]')
    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: packages/

      - name: Install E2E dependencies
        run: yarn install --ignore-engines
        working-directory: packages/syngrisi/e2e

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Generate BDD features
        run: yarn e2e:bddgen

      - name: Run E2E tests
        run: yarn test:e2e:ci
        env:
          SYNGRISI_DB_URI: mongodb://localhost:27017/SyngrisiDbTest
