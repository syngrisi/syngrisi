name: Release

on:
  # Trigger after CI workflow completes on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Manual trigger with bypass option
  workflow_dispatch:
    inputs:
      skip_ci_check:
        description: 'Skip CI check (use with caution!)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write  # Required for OIDC trusted publishing
  actions: read    # Required for checking CI workflow status

jobs:
  # Check CI status for manual triggers
  check-ci:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.skip_ci_check != 'true'
    outputs:
      ci_passed: ${{ steps.check.outputs.ci_passed }}
    steps:
      - name: Check latest CI status
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the latest CI workflow run conclusion
          CONCLUSION=$(gh run list --workflow=ci.yml --branch=main --limit=1 --json conclusion -q '.[0].conclusion')
          echo "Latest CI conclusion: $CONCLUSION"
          if [ "$CONCLUSION" = "success" ]; then
            echo "ci_passed=true" >> $GITHUB_OUTPUT
          else
            echo "ci_passed=false" >> $GITHUB_OUTPUT
            echo "::error::Latest CI run did not succeed (status: $CONCLUSION). Use 'Skip CI check' option for emergency release."
            exit 1
          fi

  release:
    runs-on: ubuntu-latest
    needs: [check-ci]
    # Run if: (CI workflow completed successfully) OR (manual with bypass) OR (manual and check-ci passed)
    if: |
      always() && (
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_ci_check == 'true') ||
        (github.event_name == 'workflow_dispatch' && needs.check-ci.outputs.ci_passed == 'true')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Install UI dependencies
        working-directory: packages/syngrisi/src/ui-app
        run: yarn install --frozen-lockfile --ignore-engines || yarn install --ignore-engines

      - name: Build
        run: yarn build

      - name: Reset working tree
        run: git checkout -- .

      # Step 1: Check if there are changesets to process
      - name: Check for changesets
        id: changesets
        uses: changesets/action@v1
        with:
          version: yarn changeset version
          createGithubReleases: false
          publish: echo "skip-publish"  # Don't publish via changesets
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Publish to npm using OIDC (no token needed)
      # This runs only when changesets actually published (merged version PR)
      - name: Publish to npm with OIDC
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          npm install -g npm@latest
          npm --version
          # Force-disable provenance; env alone is ignored under trusted publishing races.
          npm config set provenance false
          echo "provenance=$(npm config get provenance)"

          # Sequential per-package publish: parallel lerna + Sigstore races on TLOG 409
          # before the registry PUT, so nothing lands and retries keep failing.
          mapfile -t pkgs < <(npx lerna list --json --loglevel=silent | node -e '
            const d = JSON.parse(require("fs").readFileSync(0, "utf8"));
            for (const p of d) {
              if (p.private) continue;
              console.log(`${p.name}\t${p.version}\t${p.location}`);
            }
          ')
          if [ "${#pkgs[@]}" -eq 0 ]; then
            echo "No packages found"
            exit 0
          fi

          fail=0
          for row in "${pkgs[@]}"; do
            IFS=$'\t' read -r name version location <<<"$row"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Already published: ${name}@${version}"
              continue
            fi
            echo "Publishing ${name}@${version} from ${location}"
            published=0
            for attempt in 1 2 3 4 5; do
              out="$(mktemp)"
              set +e
              (cd "$location" && npm publish --access public --provenance=false) >"$out" 2>&1
              status=$?
              set -e
              cat "$out"
              if [ "$status" -eq 0 ]; then
                published=1
                break
              fi
              # Package may have landed even when attestation retry races to 409
              if npm view "${name}@${version}" version >/dev/null 2>&1; then
                echo "Treating as published after error (registry has ${name}@${version})"
                published=1
                break
              fi
              # e.g. 3.18.0 after 4.0.1 exists — cannot take "latest" implicitly
              if grep -qE 'previously published version .* is higher|must specify a tag' "$out"; then
                major="${version%%.*}"
                echo "Publishing ${name}@${version} with --tag ${major}.x (higher major already on registry)"
                set +e
                (cd "$location" && npm publish --access public --provenance=false --tag "${major}.x") >"$out" 2>&1
                status=$?
                set -e
                cat "$out"
                if [ "$status" -eq 0 ] || npm view "${name}@${version}" version >/dev/null 2>&1; then
                  # Keep latest on the 3.x line if that is what consumers currently get
                  cur="$(npm view "${name}" version 2>/dev/null || true)"
                  cur_major="${cur%%.*}"
                  if [ -n "$cur" ] && [ "$cur_major" = "$major" ]; then
                    echo "Moving latest dist-tag to ${name}@${version}"
                    npm dist-tag add "${name}@${version}" latest || true
                  fi
                  published=1
                  break
                fi
              fi
              if grep -qE 'TLOG_CREATE_ENTRY_ERROR|error creating tlog entry|EPUBLISHCONFLICT|cannot publish over' "$out"; then
                echo "Retryable publish error for ${name} (attempt ${attempt}/5) — sleeping..."
                sleep $((attempt * 8))
                continue
              fi
              echo "Non-retryable publish failure for ${name}"
              fail=1
              break
            done
            if [ "$published" -ne 1 ]; then
              echo "Failed to publish ${name}@${version}"
              fail=1
            fi
          done
          # Soft-fail if only leftover packages with higher majors blocked latest;
          # require every unpublished version to be on the registry.
          missing=0
          for row in "${pkgs[@]}"; do
            IFS=$'\t' read -r name version location <<<"$row"
            if ! npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Still missing on registry: ${name}@${version}"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "All package versions present on npm"
            exit 0
          fi
          exit "$fail"
       
      # Step 3: Create GitHub Release
      - name: Get published version
        if: steps.changesets.outputs.hasChangesets == 'false'
        id: version
        run: |
          VERSION=$(node -p "require('./packages/syngrisi/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.changesets.outputs.hasChangesets == 'false' && steps.version.outputs.version
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
