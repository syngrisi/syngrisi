<!DOCTYPE html>
<!--
  Demo site used ONLY to generate marketing screenshots for the root README.
  Render with ?v=2 to introduce intentional visual regressions (for "failed" checks).
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orbit Analytics — Executive Dashboard</title>
  <style>
    :root {
      --bg: #f5f6fb; --panel: #ffffff; --ink: #131829; --muted: #6b7390; --line: #e9ebf4;
      --indigo: #6366f1; --emerald: #10b981; --red: #ef4444; --amber: #f59e0b; --cyan: #06b6d4; --violet: #8b5cf6;
      --shadow: 0 1px 2px rgba(16,24,40,.05), 0 10px 28px rgba(16,24,40,.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--ink); padding: 24px 30px 30px; -webkit-font-smoothing: antialiased;
    }
    /* Top bar */
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .mark { width: 40px; height: 40px; border-radius: 11px; color: #fff; font-weight: 800; font-size: 20px;
      display: grid; place-items: center; background: linear-gradient(135deg, var(--indigo), var(--violet));
      box-shadow: 0 6px 16px rgba(99,102,241,.35); }
    .brand h1 { font-size: 18px; letter-spacing: -.2px; }
    .brand p { color: var(--muted); font-size: 12px; }
    .top-actions { display: flex; align-items: center; gap: 12px; }
    .seg { display: flex; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); }
    .seg span { padding: 8px 14px; font-size: 13px; color: var(--muted); border-right: 1px solid var(--line); }
    .seg span:last-child { border-right: 0; }
    .seg span.active { color: var(--ink); background: #f0f1fb; font-weight: 600; }
    .btn { padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; color: #fff;
      background: linear-gradient(135deg, var(--indigo), var(--violet)); box-shadow: 0 6px 16px rgba(99,102,241,.3); }
    .avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #34d399, #06b6d4);
      color: #063; display: grid; place-items: center; font-weight: 700; font-size: 13px; color: #fff; }

    /* KPI row */
    .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 18px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); }
    .kpi { padding: 18px 20px; display: flex; flex-direction: column; gap: 6px; }
    .kpi .label { color: var(--muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; }
    .kpi .row { display: flex; align-items: flex-end; justify-content: space-between; }
    .kpi .value { font-size: 28px; font-weight: 800; letter-spacing: -.5px; }
    .chip { font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 999px; }
    .chip.up { color: var(--emerald); background: rgba(16,185,129,.12); }
    .chip.down { color: var(--red); background: rgba(239,68,68,.12); }

    /* Main grid */
    .grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 18px; margin-bottom: 18px; }
    .card h3 { font-size: 15px; font-weight: 700; }
    .card .head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 6px; }
    .card .head .sub { color: var(--muted); font-size: 12px; font-weight: 500; }
    .legend { display: flex; gap: 14px; color: var(--muted); font-size: 12px; }
    .legend i { display: inline-block; width: 9px; height: 9px; border-radius: 3px; margin-right: 6px; vertical-align: middle; }
    .body { padding: 6px 16px 18px; }

    /* Regions */
    .regions .body { padding: 10px 20px 18px; }
    .reg { display: grid; grid-template-columns: 120px 1fr 56px; align-items: center; gap: 12px; padding: 9px 0; }
    .reg + .reg { border-top: 1px solid var(--line); }
    .reg .name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .reg .name b { width: 22px; text-align: center; }
    .track { height: 10px; background: #eef0f8; border-radius: 999px; overflow: hidden; }
    .track > div { height: 100%; border-radius: 999px; }
    .reg .pct { text-align: right; font-size: 13px; font-weight: 700; color: var(--muted); }
    footer { color: var(--muted); font-size: 11px; text-align: center; margin-top: 18px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="mark">O</div>
      <div>
        <h1>Orbit Analytics</h1>
        <p>Executive dashboard · Q2 2026</p>
      </div>
    </div>
    <div class="top-actions">
      <div class="seg"><span>Today</span><span class="active">7 days</span><span>30 days</span></div>
      <div class="btn">Export ↗</div>
      <div class="avatar">VS</div>
    </div>
  </header>

  <section class="kpis" id="kpis"></section>

  <section class="grid">
    <div class="card" id="revenue">
      <div class="head">
        <h3>Revenue over time</h3>
        <div class="legend"><span><i style="background:var(--indigo)"></i>This year</span><span><i style="background:#c7d2fe"></i>Last year</span></div>
      </div>
      <div class="body"><svg id="line" viewBox="0 0 720 250" width="100%" height="250" role="img" aria-label="revenue line chart"></svg></div>
    </div>
    <div class="card" id="map">
      <div class="head"><h3>Global activity</h3><span class="sub">live · last 60 min</span></div>
      <div class="body"><svg id="geo" viewBox="0 0 560 250" width="100%" height="250" role="img" aria-label="global activity map"></svg></div>
    </div>
  </section>

  <section class="card" id="globe" style="margin-bottom:18px">
    <div class="head"><h3>Global reach</h3><span class="sub">active edge locations</span></div>
    <div class="body"><svg id="globe-svg" viewBox="0 0 760 320" width="100%" height="320" role="img" aria-label="wireframe globe with location points"></svg></div>
  </section>

  <section class="card regions" id="regions">
    <div class="head"><h3>Traffic by region</h3><span class="sub">share of sessions</span></div>
    <div class="body" id="regbars"></div>
  </section>

  <footer>Orbit Analytics demo · generated for Syngrisi README screenshots</footer>

  <script>
    const v2 = new URLSearchParams(location.search).get('v') === '2';
    const NS = 'http://www.w3.org/2000/svg';
    const el = (t, a) => { const n = document.createElementNS(NS, t); for (const k in a) n.setAttribute(k, a[k]); return n; };

    /* ---------- KPI cards ---------- */
    const kpis = [
      { label: 'Revenue', value: '$1.24M', delta: '+8.2%', up: true, spark: [8,9,8,11,12,11,14,15], color: 'var(--indigo)' },
      { label: 'Active Users', value: '84.1k', delta: '+12.4%', up: true, spark: [5,6,6,7,8,9,10,12], color: 'var(--emerald)' },
      { label: 'Orders', value: '12.9k', delta: '+5.1%', up: true, spark: [7,7,8,8,9,9,10,11], color: 'var(--cyan)' },
      // v2: NPS regresses — value drops and trend flips to red
      { label: 'NPS', value: v2 ? '61' : '72', delta: v2 ? '−11 pts' : '+3 pts', up: !v2,
        spark: v2 ? [9,9,8,8,7,6,5,4] : [6,7,7,8,8,9,9,10], color: v2 ? 'var(--red)' : 'var(--amber)' },
    ];
    document.getElementById('kpis').innerHTML = kpis.map((k, i) => {
      const max = Math.max(...k.spark), min = Math.min(...k.spark);
      const pts = k.spark.map((v, j) => `${j * (110 / (k.spark.length - 1))},${34 - ((v - min) / (max - min || 1)) * 30}`).join(' ');
      return `<div class="card kpi">
        <div class="label">${k.label}</div>
        <div class="row"><div class="value">${k.value}</div><div class="chip ${k.up ? 'up' : 'down'}">${k.up ? '▲' : '▼'} ${k.delta}</div></div>
        <svg viewBox="0 0 110 36" width="110" height="36"><polyline fill="none" stroke="${k.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/></svg>
      </div>`;
    }).join('');

    /* ---------- Revenue line/area chart ---------- */
    const line = document.getElementById('line');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const cur = [32,38,36,45,52,49,58,64,61,70,76, v2 ? 58 : 82]; // v2: year-end dips
    const prev = [28,30,33,35,40,42,46,48,50,54,57,60];
    const W = 720, H = 250, pad = { l: 36, r: 16, t: 16, b: 28 }, max = 90;
    const X = i => pad.l + i * ((W - pad.l - pad.r) / (months.length - 1));
    const Y = v => pad.t + (1 - v / max) * (H - pad.t - pad.b);
    for (let g = 0; g <= 3; g++) { const y = pad.t + g * ((H - pad.t - pad.b) / 3);
      line.appendChild(el('line', { x1: pad.l, y1: y, x2: W - pad.r, y2: y, stroke: '#eef0f8', 'stroke-width': 1 })); }
    const defs = el('defs', {}); defs.innerHTML =
      '<linearGradient id="area" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6366f1" stop-opacity=".22"/><stop offset="1" stop-color="#6366f1" stop-opacity="0"/></linearGradient>';
    line.appendChild(defs);
    const path = a => a.map((v, i) => `${i ? 'L' : 'M'}${X(i)} ${Y(v)}`).join(' ');
    line.appendChild(el('path', { d: `${path(cur)} L${X(11)} ${Y(0)} L${X(0)} ${Y(0)} Z`, fill: 'url(#area)' }));
    line.appendChild(el('path', { d: path(prev), fill: 'none', stroke: '#c7d2fe', 'stroke-width': 2.5, 'stroke-dasharray': '5 5', 'stroke-linejoin': 'round' }));
    line.appendChild(el('path', { d: path(cur), fill: 'none', stroke: '#6366f1', 'stroke-width': 3, 'stroke-linejoin': 'round', 'stroke-linecap': 'round' }));
    cur.forEach((v, i) => { if (i === cur.length - 1) { line.appendChild(el('circle', { cx: X(i), cy: Y(v), r: 5, fill: '#6366f1', stroke: '#fff', 'stroke-width': 2.5 })); } });
    months.forEach((m, i) => { const t = el('text', { x: X(i), y: H - 8, 'text-anchor': 'middle', fill: '#9aa1bd', 'font-size': 11 }); t.textContent = m; line.appendChild(t); });

    /* ---------- Global activity map ---------- */
    const geo = document.getElementById('geo');
    const dpat = el('defs', {});
    dpat.innerHTML = '<pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.3" fill="#e4e7f2"/></pattern>'
      + '<filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
    geo.appendChild(dpat);
    geo.appendChild(el('rect', { x: 0, y: 0, width: 560, height: 250, fill: 'url(#dots)', rx: 10 }));
    const nodes = [
      { x: 70, y: 140, r: 7, c: '#6366f1', n: 'SF' },
      { x: 150, y: 115, r: 6, c: '#6366f1', n: 'NY' },
      { x: 250, y: 88, r: 10, c: '#10b981', n: 'London' },
      { x: 300, y: 100, r: 6, c: '#8b5cf6', n: 'Berlin' },
      // v2: APAC hotspot moves, grows and turns red
      v2 ? { x: 470, y: 165, r: 15, c: '#ef4444', n: 'Tokyo', pulse: true } : { x: 440, y: 130, r: 8, c: '#06b6d4', n: 'Tokyo' },
      { x: 415, y: 200, r: 6, c: '#6366f1', n: 'Singapore' },
      { x: 175, y: 205, r: 6, c: '#f59e0b', n: 'São Paulo' },
    ];
    const byName = n => nodes.find(d => d.n === n);
    [['SF','NY'],['NY','London'],['London','Berlin'],['London','Tokyo'],['Tokyo','Singapore'],['NY','São Paulo']].forEach(([a, b]) => {
      const p = byName(a), q = byName(b); const mx = (p.x + q.x) / 2, my = Math.min(p.y, q.y) - 26;
      geo.appendChild(el('path', { d: `M${p.x} ${p.y} Q${mx} ${my} ${q.x} ${q.y}`, fill: 'none', stroke: '#c7d2fe', 'stroke-width': 1.4, opacity: .9 }));
    });
    nodes.forEach(d => {
      if (d.pulse) geo.appendChild(el('circle', { cx: d.x, cy: d.y, r: d.r + 8, fill: d.c, opacity: .18 }));
      geo.appendChild(el('circle', { cx: d.x, cy: d.y, r: d.r, fill: d.c, filter: 'url(#glow)' }));
      geo.appendChild(el('circle', { cx: d.x, cy: d.y, r: Math.max(2, d.r - 4), fill: '#fff', opacity: .85 }));
      const t = el('text', { x: d.x, y: d.y + d.r + 13, 'text-anchor': 'middle', fill: '#6b7390', 'font-size': 10, 'font-weight': 600 }); t.textContent = d.n; geo.appendChild(t);
    });

    /* ---------- Region bars ---------- */
    const regions = v2
      ? [{ n: 'North America', f: '🌎', v: 39, c: '#6366f1' }, { n: 'Europe', f: '🌍', v: 26, c: '#10b981' }, { n: 'APAC', f: '🌏', v: 27, c: '#ef4444' }, { n: 'LATAM', f: '🌎', v: 8, c: '#f59e0b' }]
      : [{ n: 'North America', f: '🌎', v: 42, c: '#6366f1' }, { n: 'Europe', f: '🌍', v: 28, c: '#10b981' }, { n: 'APAC', f: '🌏', v: 18, c: '#06b6d4' }, { n: 'LATAM', f: '🌎', v: 12, c: '#f59e0b' }];
    document.getElementById('regbars').innerHTML = regions.map(r => `
      <div class="reg">
        <div class="name"><b>${r.f}</b> ${r.n}</div>
        <div class="track"><div style="width:${r.v * 2}%;background:linear-gradient(90deg,${r.c},${r.c}cc)"></div></div>
        <div class="pct">${r.v}%</div>
      </div>`).join('');

    /* ---------- Wireframe globe with location points ----------
       v2 nudges only 3 tiny points by ~2-3px — a near-invisible diff that
       showcases Syngrisi's "difference highlighting" in the diff viewer. */
    const gsvg = document.getElementById('globe-svg');
    const gcx = 380, gcy = 160, R = 120;
    const gdefs = el('defs', {});
    gdefs.innerHTML = '<radialGradient id="sphere" cx="38%" cy="30%" r="78%">'
      + '<stop offset="0" stop-color="#f1f4ff"/><stop offset="60%" stop-color="#e4e9ff"/><stop offset="100%" stop-color="#d2d9f6"/></radialGradient>'
      + '<filter id="pglow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2.2" result="b"/>'
      + '<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
    gsvg.appendChild(gdefs);
    gsvg.appendChild(el('circle', { cx: gcx, cy: gcy, r: R, fill: 'url(#sphere)', stroke: '#c5cdf2', 'stroke-width': 1 }));
    [-0.8, -0.45, 0, 0.45, 0.8].forEach((f) => { const dy = f * R, rx = Math.sqrt(R * R - dy * dy);
      gsvg.appendChild(el('ellipse', { cx: gcx, cy: gcy + dy, rx, ry: rx * 0.17, fill: 'none', stroke: '#aab4ee', 'stroke-width': 1, opacity: .55 })); });
    [0.25, 0.55, 0.82].forEach((f) => gsvg.appendChild(el('ellipse', { cx: gcx, cy: gcy, rx: R * f, ry: R, fill: 'none', stroke: '#aab4ee', 'stroke-width': 1, opacity: .55 })));
    gsvg.appendChild(el('line', { x1: gcx, y1: gcy - R, x2: gcx, y2: gcy + R, stroke: '#aab4ee', 'stroke-width': 1, opacity: .55 }));
    let dots = [
      { k: 'sf', x: -78, y: -18, r: 4, c: '#6366f1' }, { k: 'ny', x: -44, y: -34, r: 4, c: '#6366f1' },
      { k: 'lon', x: -6, y: -52, r: 5, c: '#10b981' }, { k: 'ber', x: 18, y: -42, r: 4, c: '#8b5cf6' },
      { k: 'cai', x: 30, y: 6, r: 3, c: '#f59e0b' }, { k: 'mum', x: 58, y: 8, r: 4, c: '#06b6d4' },
      { k: 'tok', x: 92, y: -14, r: 4, c: '#6366f1' }, { k: 'sin', x: 78, y: 34, r: 4, c: '#06b6d4' },
      { k: 'syd', x: 96, y: 62, r: 4, c: '#10b981' }, { k: 'sao', x: -40, y: 54, r: 4, c: '#f59e0b' },
    ];
    if (v2) dots = dots.map((d) => {
      if (d.k === 'tok') return { ...d, x: d.x + 3, y: d.y + 2 };
      if (d.k === 'sao') return { ...d, y: d.y - 3 };
      if (d.k === 'syd') return { ...d, x: d.x - 2, y: d.y + 3 };
      return d;
    });
    dots.forEach((d) => {
      const x = gcx + d.x, y = gcy + d.y;
      gsvg.appendChild(el('circle', { cx: x, cy: y, r: d.r + 2, fill: d.c, opacity: .22 }));
      gsvg.appendChild(el('circle', { cx: x, cy: y, r: d.r, fill: d.c, filter: 'url(#pglow)' }));
      gsvg.appendChild(el('circle', { cx: x, cy: y, r: Math.max(1, d.r - 2), fill: '#fff', opacity: .85 }));
    });
  </script>
</body>
</html>
